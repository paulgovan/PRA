project:
  type: book

book:
  title: "Project Risk Analysis: A Practical Guide"
  subtitle: "From Monte Carlo to AI Agents"
  author: "Paul Govan"
  date: today
  cover-image: cover.png
  sidebar:
    logo: cover.png
  site-url: https://paulgovan.github.io/PRA/book/
  repo-url: https://github.com/paulgovan/PRA
  repo-actions: [edit, issue]
  downloads: [pdf, epub]
  sharing: [twitter, linkedin, facebook]
  chapters:
    - index.qmd
    - intro.qmd
    - ch-mcs.qmd
    - ch-smm.qmd
    - ch-sensitivity.qmd
    - ch-evm.qmd
    - ch-bayes.qmd
    - ch-sigmoidal.qmd
    - ch-dsm.qmd
    - ch-network.qmd
    - ch-network2.qmd
    - ch-agent.qmd
  appendices:
    - appendix-glossary.qmd
    - appendix-math.qmd
    - appendix-ref.qmd
    - appendix-casestudy.qmd
    - appendix-solutions.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    code-fold: false
    code-tools: true
    toc: true
    toc-depth: 3
    number-sections: true
    highlight-style: github
  pdf:
    documentclass: scrbook
    colorlinks: true
    cover-image: cover.png
    geometry:
      - margin=1in
    fontsize: 11pt
    fig-width: 5.5
    fig-height: 4
    code-overflow: wrap
  epub:
    cover-image: cover.png
    toc: true
    fig-width: 5

execute:
  warning: false
  message: false
